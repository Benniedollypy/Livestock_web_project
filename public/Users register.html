<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Users register</title>
    <link rel="stylesheet" href="Dolly_forms_style.css" />
  </head>
  <body>
    <div class="user_container">
      <form action="">
        <div class="user_details">
          <h4>Admin Registration Form</h4>
          <div class="user_form_container">
            <div class="user_form_control full-width">
              <label for="title">Title</label>
              <select id="title" name="title" required>
                <option value="Mr.">Mr.</option>
                <option value="Miss/Mrs.">Miss/Mrs.</option>
                <option value="Dr.">Dr.</option>
              </select>
            </div>

            <div class="user_form_control">
              <label for="first_name">First name</label>
              <input
                id="first_name"
                name="first_name"
                type="text"
                placeholder="Enter first name..."
                required
              />
            </div>

            <div class="user_form_control">
              <label for="last_name">Last name</label>
              <input
                id="last_name"
                name="last_name"
                type="text"
                placeholder="Enter last name..."
                required
              />
            </div>

            <div class="user_form_control full-width">
              <label for="email">Email</label>
              <input
                id="email"
                name="email"
                type="email"
                placeholder="Enter email..."
                required
              />
            </div>

            <div class="user_form_control">
              <label for="password">Password</label>
              <input
                id="password"
                name="password"
                type="password"
                maxlength="20"
                placeholder="Please enter your password"
                required
              />
            </div>

            <div class="user_form_control">
              <label for="re_enter_password">Re-enter Password</label>
              <input
                id="re_enter_password"
                name="re_enter_password"
                type="password"
                maxlength="20"
                placeholder="Please re-enter your password"
                required
              />
            </div>

            <div class="about_you_control">
              <label for="about_you">About you</label>
              <textarea
                id="about_you"
                name="about_you"
                rows="5"
                cols="80"
                placeholder="Please let us get to know you more....."
                required
              ></textarea>
            </div>

            <div class="button_container">
              <button id="register" name="register" type="submit">
                Register
              </button>
            </div>
          </div>
        </div>
      </form>
    </div>
  </body>
</html>
